<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Chat Tailwind</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-white w-full max-w-2xl rounded-xl shadow-xl flex flex-col h-[85vh] overflow-hidden">
        
        <div class="bg-gray-600 text-white px-6 py-4 shadow-md">
            <h1 class="text-xl font-bold">Chat Geral</h1>
        </div>

        <div id="chat-box" class="flex-grow p-6 overflow-y-auto flex flex-col gap-3 bg-gray-50">
            </div>

        <div class="bg-white p-4 border-t border-gray-200">
            <form id="chat-form" class="flex flex-col sm:flex-row gap-3">
                <input 
                    type="text" 
                    id="nick" 
                    placeholder="Seu Nick" 
                    required
                    class="w-full sm:w-1/3 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                >
                <div class="flex flex-grow gap-3 w-full">
                    <input 
                        type="text" 
                        id="mensagem" 
                        placeholder="Digite sua mensagem..." 
                        required
                        class="flex-grow px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                    <button 
                        type="submit" 
                        class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg transition duration-200"
                    >
                        Enviar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io(); 

        const chatForm = document.getElementById('chat-form');
        const nickInput = document.getElementById('nick');
        const msgInput = document.getElementById('mensagem');
        const chatBox = document.getElementById('chat-box');

        // Escuta o evento de envio do formulário
        chatForm.addEventListener('submit', (e) => {
            e.preventDefault(); 
            
            const nick = nickInput.value.trim();
            const msg = msgInput.value.trim();

            if (nick && msg) {
                // Envia para o servidor
                socket.emit('mensagem', { nick, msg });
                
                
                msgInput.value = '';
                msgInput.focus();
            }
        });

        // Escuta as mensagens vindas do servidor
        socket.on('mensagem', (dados) => {
            // Cria o elemento da mensagem
            const div = document.createElement('div');
            div.className = "bg-white p-3 rounded-lg shadow-sm border border-gray-100 w-full self-start";
            div.innerHTML = `<span class="font-bold text-blue-600">${dados.nick}:</span> <span class="text-gray-800">${dados.msg}</span>`;
            
            // Adiciona a mensagem ao chat
            chatBox.appendChild(div);
            
           
        });
    </script>
</body>
</html>
